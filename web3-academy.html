        .back-btn:hover{background:var(--primary);color:#000}
        .video-link{display:inline-block;padding:10px 20px;background:linear-gradient(90deg,var(--primary),var(--secondary));color:#000;border-radius:25px;text-decoration:none;margin-top:12px;font-size:14px}
        .task-box{background:rgba(0,240,255,0.1);border:1px solid rgba(0,240,255,0.3);border-radius:10px;padding:14px;margin-top:16px}
        .task-box h4{color:var(--primary);margin-bottom:8px;font-size:14px}
        .task-box p{color:var(--text);font-size:14px}
        .price-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
        .price-card{background:var(--bg-card);border-radius:10px;padding:16px;text-align:center}
        .price-icon{font-size:24px;margin-bottom:6px}
        .price-name{font-size:12px;color:var(--text-dim);margin-bottom:4px}
        .price-value{font-size:18px;font-weight:bold}
        .price-change{font-size:12px;margin-top:4px}
        .price-up{color:#00ff88}
        .price-down{color:#ff4444}
        .news-list{display:grid;gap:12px}
        .news-item{background:var(--bg-card);border-radius:10px;padding:16px;border-left:4px solid var(--primary)}
        .news-title{font-size:15px;margin-bottom:6px}
        .news-meta{font-size:11px;color:var(--text-dim);margin-bottom:6px}
        .news-desc{font-size:13px;color:var(--text-dim);line-height:1.5}
        .tag{display:inline-block;padding:2px 8px;background:rgba(0,240,255,0.1);color:var(--primary);border-radius:10px;font-size:10px;margin-right:6px}
        .loading{text-align:center;padding:30px;color:var(--text-dim)}
        @media(max-width:600px){.tabs{gap:5px}.tab{padding:8px 14px;font-size:12px}}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">⛓️</div>
            <h1>Web3 Academy</h1>
            <p class="subtitle">2周Web3入门</p>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <p class="progress-text" id="progressText"></p>
        </header>
        <div class="tabs">
            <div class="tab active" data-tab="courses">📚 学习课程</div>
            <div class="tab" data-tab="news">📰 资讯</div>
            <div class="tab" data-tab="prices">💰 行情</div>
        </div>
        <div class="content active" id="courses">
            <div class="course-list" id="courseList"></div>
            <div id="courseDetail"></div>
        </div>
        <div class="content" id="news"><div class="news-list" id="newsList"></div></div>
        <div class="content" id="prices"><div class="price-grid" id="priceGrid"></div></div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded',()=>{renderCourses();loadPrices();loadNews();updateProgress();initTabs()});
        function initTabs(){document.querySelectorAll('.tab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.content').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.getElementById(t.dataset.tab).classList.add('active')})})}
        function updateProgress(){const p=(CONFIG.progress.completedDays/CONFIG.progress.totalDays)*100;document.getElementById('progressFill').style.width=p+'%';document.getElementById('progressText').textContent=`第${CONFIG.progress.currentDay}天 · ${CONFIG.progress.completedDays}/${CONFIG.progress.totalDays}天 · ${Math.round(p)}%`}
        function renderCourses(){const list=document.getElementById('courseList');list.innerHTML=CONFIG.courses.map(c=>`<div class="course-item ${c.status}" onclick="showCourse(${c.day})"><div class="course-day">第${c.day}天</div><div class="course-title">${c.title}</div><div class="course-desc">${c.desc}</div></div>`).join('')}
        function showCourse(day){const c=CONFIG.courses.find(x=>x.day===day);const d=document.getElementById('courseDetail');let videoHtml=c.video?`<a href="${c.video}" target="_blank" class="video-link">🎬 观看视频教程</a>`:'';let taskHtml=c.task?`<div class="task-box"><h4>💻 今日实操任务</h4><p>${c.task}</p></div>`:'';d.innerHTML=`<div class="back-btn" onclick="showList()">← 返回课程列表</div><div class="detail-view"><h3>第${c.day}天：${c.title}</h3>${c.content}${videoHtml}${taskHtml}</div>`;document.getElementById('courseList').style.display='none';d.scrollIntoView({behavior:'smooth'})}
        function showList(){document.getElementById('courseDetail').innerHTML='';document.getElementById('courseList').style.display='grid'}
        async function loadPrices(){const g=document.getElementById('priceGrid');g.innerHTML='<div class="loading">加载中...';try{const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,origin-protocol&vs_currencies=usd&include_24hr_change=true');const d=await r.json();const ic={bitcoin:'₿',ethereum:'Ξ',solana:'◎','origin-protocol':'OG'};const nm={bitcoin:'Bitcoin',ethereum:'Ethereum',solana:'Solana','origin-protocol':'Origin'};g.innerHTML=Object.keys(d).map(k=>`<div class="price-card"><div class="price-icon">${ic[k]||'💎'}</div><div class="price-name">${nm[k]||k}</div><div class="price-value">$${d[k].usd.toLocaleString()}</div><div class="price-change ${d[k].usd_24h_change>=0?'price-up':'price-down'}">${d[k].usd_24h_change>=0?'↑':'↓'} ${Math.abs(d[k].usd_24h_change).toFixed(2)}%</div></div>`).join('')}catch(e){g.innerHTML='<div class="loading">加载失败</div>'}}
        function loadNews(){const n=document.getElementById('newsList');n.innerHTML=`<div class="news-item"><div class="news-title">BTC突破$70,000</div><div class="news-meta"><span class="tag">BTC</span>2026-03-12</div><div class="news-desc">比特币今日突破关键阻力位，市场情绪持续升温...</div></div><div class="news-item"><div class="news-title">DeFi TVL创新高</div><div class="news-meta"><span class="tag">DeFi</span>2026-03-12</div><div class="news-desc">去中心化金融总锁仓量突破500亿美元...</div></div><div class="news-item"><div class="news-title">LGNs生态进展</div><div class="news-meta"><span class="tag">LGNs</span>2026-03-12</div><div class="news-desc">Origin Protocol生态持续扩张，TVL环比增长...</div></div>`}
    </script>
</body>
</html>
