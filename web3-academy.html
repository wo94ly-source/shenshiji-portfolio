    <style>
        :root{--primary:#00f0ff;--secondary:#7b2cbf;--accent:#ff006e;--bg-dark:#0a0a0f;--bg-card:#12121a;--text:#e0e0e0;--text-dim:#888}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg-dark);color:var(--text);min-height:100vh;background-image:radial-gradient(ellipse at 20% 20%,rgba(0,240,255,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(123,44,191,0.08) 0%,transparent 50%)}
        .container{max-width:1200px;margin:0 auto;padding:20px}
        header{text-align:center;padding:40px 0}
        .logo{font-size:48px;margin-bottom:10px}
        h1{font-size:36px;background:linear-gradient(90deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
        .subtitle{color:var(--text-dim);font-size:16px}
        .progress-bar{background:var(--bg-card);border-radius:20px;height:8px;margin:20px auto;max-width:600px;overflow:hidden}
        .progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:20px;transition:width 0.5s}
        .progress-text{text-align:center;color:var(--text-dim);font-size:14px;margin-bottom:30px}
        .tabs{display:flex;gap:10px;margin-bottom:30px;flex-wrap:wrap;justify-content:center}
        .tab{padding:12px 24px;background:var(--bg-card);border:1px solid rgba(255,255,255,0.1);border-radius:30px;cursor:pointer;transition:all 0.3s;color:var(--text)}
        .tab:hover,.tab.active{background:linear-gradient(90deg,var(--primary),var(--secondary));border-color:transparent;color:#000;font-weight:bold}
        .content{display:none}
        .content.active{display:block}
        .week-section{margin-bottom:40px}
        .week-title{font-size:20px;color:var(--primary);margin-bottom:15px;padding-bottom:10px;border-bottom:1px solid rgba(0,240,255,0.2)}
        .course-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px}
        .course-card{background:var(--bg-card);border-radius:12px;padding:20px;border:1px solid rgba(255,255,255,0.05);transition:all 0.3s;cursor:pointer;position:relative}
        .course-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:4px 0 0 4px}
        .course-card.completed::before{background:#00ff88}
        .course-card.active::before{background:var(--primary)}
        .course-card.locked::before{background:var(--text-dim)}
        .course-card:hover:not(.locked){transform:translateY(-4px);border-color:var(--primary)}
        .course-card.locked{opacity:0.5;cursor:not-allowed}
        .course-day{font-size:12px;color:var(--text-dim);margin-bottom:6px}
        .course-title{font-size:16px;margin-bottom:6px}
        .course-desc{font-size:13px;color:var(--text-dim)}
        .course-status{position:absolute;top:16px;right:16px;font-size:18px}
        .course-type{display:inline-block;padding:3px 10px;background:rgba(0,240,255,0.1);color:var(--primary);border-radius:12px;font-size:11px;margin-top:8px}
        .quiz-container{max-width:700px;margin:0 auto}
        .quiz-header{text-align:center;margin-bottom:30px;padding:20px;background:var(--bg-card);border-radius:16px}
        .quiz-title{font-size:24px;color:var(--primary);margin-bottom:10px}
        .quiz-desc{color:var(--text-dim)}
        .quiz-card{background:var(--bg-card);border-radius:16px;padding:24px;margin-bottom:20px}
        .quiz-question{font-size:17px;margin-bottom:16px}
        .quiz-options{display:flex;flex-direction:column;gap:10px}
        .quiz-option{padding:14px 18px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:10px;cursor:pointer;transition:all 0.3s}
        .quiz-option:hover:not(.disabled){border-color:var(--primary);background:rgba(0,240,255,0.1)}
        .quiz-option.disabled{pointer-events:none}
        .quiz-option.correct{border-color:#00ff88;background:rgba(0,255,136,0.15)}
        .quiz-option.wrong{border-color:#ff4444;background:rgba(255,68,68,0.15)}
        .quiz-result{text-align:center;padding:30px;background:var(--bg-card);border-radius:16px;display:none}
        .quiz-result.show{display:block}
        .result-score{font-size:48px;font-weight:bold;color:var(--primary);margin-bottom:10px}
        .result-message{font-size:18px}
        .news-grid{display:grid;gap:16px}
        .news-card{background:var(--bg-card);border-radius:12px;padding:20px;border-left:4px solid var(--primary)}
        .news-title{font-size:16px;margin-bottom:8px}
        .news-meta{font-size:12px;color:var(--text-dim);margin-bottom:10px}
        .news-desc{font-size:14px;color:var(--text-dim);line-height:1.6}
        .news-tag{display:inline-block;padding:3px 10px;background:rgba(0,240,255,0.1);color:var(--primary);border-radius:12px;font-size:11px;margin-right:8px}
        .price-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
        .price-card{background:var(--bg-card);border-radius:12px;padding:20px;text-align:center}
        .price-icon{font-size:28px;margin-bottom:8px}
        .price-name{font-size:13px;color:var(--text-dim);margin-bottom:5px}
        .price-value{font-size:22px;font-weight:bold}
        .price-change{font-size:13px;margin-top:5px}
        .price-up{color:#00ff88}
        .price-down{color:#ff4444}
        .refresh-btn{display:block;margin:20px auto;padding:12px 30px;background:var(--bg-card);border:1px solid var(--primary);color:var(--primary);border-radius:25px;cursor:pointer}
        .refresh-btn:hover{background:var(--primary);color:#000}
        .loading{text-align:center;padding:40px;color:var(--text-dim)}
        @media(max-width:600px){.tabs{gap:8px}.tab{padding:10px 14px;font-size:13px}.course-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">⛓️</div>
            <h1>Web3 Academy</h1>
            <p class="subtitle">8周从小白到Web3玩家</p>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <p class="progress-text" id="progressText">加载中...</p>
        </header>
        <div class="tabs">
            <div class="tab active" data-tab="courses">📚 课程中心</div>
            <div class="tab" data-tab="news">📰 今日讯息</div>
            <div class="tab" data-tab="prices">💰 实时行情</div>
            <div class="tab" data-tab="quiz">📝 章节测验</div>
        </div>
        <div class="content active" id="courses"><div id="courseList"></div></div>
        <div class="content" id="news"><div class="news-grid" id="newsGrid"><div class="loading">加载中...</div></div></div>
        <div class="content" id="prices"><div class="price-grid" id="priceGrid"><div class="loading">加载中...</div></div><button class="refresh-btn" onclick="loadPrices()">🔄 刷新价格</button></div>
        <div class="content" id="quiz"><div class="quiz-container" id="quizContainer"><div class="quiz-header"><div class="quiz-title">📝 章节测验</div><div class="quiz-desc">完成课程后进行测试</div></div><div id="weekSelect"></div></div></div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded',()=>{renderCourses();renderWeekSelect();loadPrices();loadNews();updateProgress();initTabs()});
        function initTabs(){document.querySelectorAll('.tab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.content').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.getElementById(t.dataset.tab).classList.add('active')})})}
        function updateProgress(){const p=(CONFIG.progress.completedDays/CONFIG.progress.totalDays)*100;document.getElementById('progressFill').style.width=p+'%';document.getElementById('progressText').textContent=`第${CONFIG.progress.currentDay}天 · 完成${CONFIG.progress.completedDays}/56天 · ${Math.round(p)}%`}
        function renderCourses(){let h='';for(let w=1;w<=8;w++){const cs=CONFIG.courses.filter(c=>c.week===w);const done=cs.filter(c=>c.status==='completed').length;h+=`<div class="week-section"><div class="week-title">第${w}周 · ${['基础概念','工具使用','DeFi入门','代币经济','NFT','Layer2','DAO/治理','实战赚钱'][w-1]} (${done}/${cs.length})</div><div class="course-grid">`;cs.forEach(c=>{const tl={theory:'理论',tool:'实操',quiz:'测验',project:'项目',strategy:'策略'};h+=`<div class="course-card ${c.status}" data-day="${c.day}" data-week="${c.week}"><span class="course-status">${c.status==='completed'?'✅':c.status==='active'?'🔥':c.type==='quiz'?'📝':'🔒'}</span><div class="course-day">第${c.day}天</div><div class="course-title">${c.title}</div><div class="course-desc">${c.desc}</div><span class="course-type">${tl[c.type]}</span></div>`});h+='</div></div>'}document.getElementById('courseList').innerHTML=h;document.querySelectorAll('.course-card').forEach(c=>{c.addEventListener('click',()=>{const c2=CONFIG.courses.find(x=>x.day===parseInt(c.dataset.day));if(c2.type==='quiz'){document.querySelectorAll('.tab')[3].click();startQuiz(parseInt(c.dataset.week))}})})}
        function renderWeekSelect(){let h='<p style="text-align:center;color:var(--text-dim);margin-bottom:20px">选择测验章节：</p><div class="course-grid">';for(let w=1;w<=8;w++){const cs=CONFIG.courses.filter(c=>c.week===w);const unlocked=cs.some(c=>c.status==='completed'||c.status==='active');h+=`<div class="course-card ${unlocked?'':'locked'}" onclick="startQuiz(${w})"><div class="course-title">第${w}周测验</div><div class="course-desc">${['基础','工具','DeFi','代币','NFT','Layer2','DAO','实战'][w-1]}</div><span class="course-type">${unlocked?'📝答题':'🔒'}</span></div>`}h+='</div>';document.getElementById('weekSelect').innerHTML=h}
        let currentQuiz=null,quizAnswers={};
        function startQuiz(week){const qs=CONFIG.quizzes[week];if(!qs)return;currentQuiz={week,qs,correct:0};quizAnswers={};document.getElementById('quizContainer').innerHTML=`<div class="quiz-header"><div class="quiz-title">第${week}周测验</div><div class="quiz-desc">共${qs.length}题</div></div><div id="quizQuestions"></div>`;renderQuizQuestions()}
        function renderQuizQuestions(){let h='';currentQuiz.qs.forEach((q,i)=>{h+=`<div class="quiz-card" id="q${i}"><div class="quiz-question">${i+1}. ${q.q}</div><div class="quiz-options">${q.options.map((o,j)=>`<div class="quiz-option" data-q="${i}" data-a="${j}" onclick="selectAnswer(${i},${j})">${o}</div>`).join('')}</div></div>`});document.getElementById('quizQuestions').innerHTML=h}
        function selectAnswer(qIdx,aIdx){if(quizAnswers[qIdx]!==undefined)return;quizAnswers[qIdx]=aIdx;const q=currentQuiz.qs[qIdx];document.querySelectorAll(`[data-q="${qIdx}"]`).forEach(o=>{o.classList.add('disabled');if(parseInt(o.dataset.a)===q.a)o.classList.add('correct')});if(aIdx===q.a){document.querySelector(`[data-q="${qIdx}"][data-a="${aIdx}"]`).classList.add('correct');currentQuiz.correct++}else document.querySelector(`[data-q="${qIdx}"][data-a="${aIdx}"]`).classList.add('wrong');if(Object.keys(quizAnswers).length===currentQuiz.qs.length)showResult()}
        function showResult(){const s=Math.round((currentQuiz.correct/currentQuiz.qs.length)*100);const ms={100:'🎉满分！',80:'🌟很棒！',60:'📚不错！',40:'💪加油！',0:'📖再学！'};let m=ms[100];if(s<100&&s>=80)m=ms[80];else if(s<80&&s>=60)m=ms[60];else if(s<60&&s>=40)m=ms[40];else if(s<40)m=ms[0];document.getElementById('quizContainer').innerHTML+=`<div class="quiz-result show"><div class="result-score">${s}分</div><div class="result-message">${m}</div></div>`}
        async function loadPrices(){const g=document.getElementById('priceGrid');g.innerHTML='<div class="loading">加载中...</div>';try{const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,origin-protocol,flow,telos&vs_currencies=usd&include_24hr_change=true');const d=await r.json();const ic={bitcoin:'₿',ethereum:'Ξ',solana:'◎','origin-protocol':'OG',flow:'⬡',telos:'TLOS'};const nm={bitcoin:'Bitcoin',ethereum:'Ethereum',solana:'Solana','origin-protocol':'Origin(OGN)',flow:'Flow',telos:'Telos'};g.innerHTML=Object.keys(d).map(k=>`<div class="price-card"><div class="price-icon">${ic[k]||'💎'}</div><div class="price-name">${nm[k]||k}</div><div class="price-value">$${d[k].usd.toLocaleString()}</div><div class="price-change ${d[k].usd_24h_change>=0?'price-up':'price-down'}">${d[k].usd_24h_change>=0?'↑':'↓'} ${Math.abs(d[k].usd_24h_change).toFixed(2)}%</div></div>`).join('')}catch(e){g.innerHTML='<div class="loading">加载失败</div>'}}
        function loadNews(){const g=document.getElementById('newsGrid');g.innerHTML=`<div class="news-card"><div class="news-title">BTC突破关键阻力位</div><div class="news-meta"><span class="news-tag">BTC</span>2026-03-12</div><div class="news-desc">比特币今日突破关键阻力位，市场情绪转暖...</div></div><div class="news-card"><div class="news-title">DeFi TVL创月度新高</div><div class="news-meta"><span class="news-tag">DeFi</span>2026-03-12</div><div class="news-desc">去中心化金融总锁仓量突破500亿美元...</div></div><div class="news-card"><div class="news-title">LGNs生态持续增长</div><div class="news-meta"><span class="news-tag">LGNs</span>2026-03-12</div><div class="news-desc">Origin Protocol生态持续扩张，TVL创新高...</div></div>`}
    </script>
