    <style>
        :root {
            --primary: #00f0ff;
            --secondary: #7b2cbf;
            --accent: #ff006e;
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --text: #e0e0e0;
            --text-dim: #888;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 20% 20%, rgba(0,240,255,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(123,44,191,0.08) 0%, transparent 50%);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        header {
            text-align: center;
            padding: 40px 0;
            position: relative;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        h1 {
            font-size: 36px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: var(--text-dim);
            font-size: 16px;
        }
        
        /* 进度条 */
        .progress-bar {
            background: var(--bg-card);
            border-radius: 20px;
            height: 8px;
            margin: 20px auto;
            max-width: 600px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 20px;
            transition: width 0.5s ease;
        }
        
        .progress-text {
            text-align: center;
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        /* 标签页 */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .tab {
            padding: 12px 24px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text);
        }
        
        .tab:hover, .tab.active {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-color: transparent;
            color: #000;
            font-weight: bold;
        }
        
        /* 内容区域 */
        .content {
            display: none;
        }
        
        .content.active {
            display: block;
        }
        
        /* 课程卡片 */
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .course-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .course-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
        }
        
        .course-card.completed::before { background: #00ff88; }
        .course-card.active::before { background: var(--primary); }
        .course-card.locked::before { background: var(--text-dim); }
        
        .course-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: 0 10px 40px rgba(0,240,255,0.1);
        }
        
        .course-card.completed { opacity: 0.7; }
        .course-card.locked { opacity: 0.5; cursor: not-allowed; }
        
        .course-day {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }
        
        .course-title {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--primary);
        }
        
        .course-desc {
            font-size: 14px;
            color: var(--text-dim);
        }
        
        .course-status {
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: 20px;
        }
        
        /* 价格卡片 */
        .price-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }
        
        .price-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }
        
        .price-icon { font-size: 32px; margin-bottom: 10px; }
        .price-name { font-size: 14px; color: var(--text-dim); margin-bottom: 5px; }
        .price-value { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .price-change { font-size: 14px; }
        .price-up { color: #00ff88; }
        .price-down { color: #ff4444; }
        
        /* 测试区域 */
        .quiz-container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .quiz-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
        }
        
        .quiz-question {
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--primary);
        }
        
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .quiz-option {
            padding: 15px 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .quiz-option:hover {
            border-color: var(--primary);
            background: rgba(0,240,255,0.1);
        }
        
        .quiz-option.selected {
            border-color: var(--primary);
            background: rgba(0,240,255,0.2);
        }
        
        .quiz-option.correct {
            border-color: #00ff88;
            background: rgba(0,255,136,0.2);
        }
        
        .quiz-option.wrong {
            border-color: #ff4444;
            background: rgba(255,68,68,0.2);
        }
        
        .quiz-result {
            text-align: center;
            padding: 20px;
            font-size: 18px;
            display: none;
        }
        
        .quiz-result.show { display: block; }
        
        .quiz-result.success { color: #00ff88; }
        .quiz-result.fail { color: #ff4444; }
        
        /* 学习内容 */
        .study-content {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 30px;
        }
        
        .study-content h2 {
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .study-content h3 {
            color: var(--secondary);
            margin: 20px 0 10px;
            font-size: 18px;
        }
        
        .study-content p {
            color: var(--text);
            line-height: 1.8;
            margin-bottom: 15px;
        }
        
        .study-content ul {
            padding-left: 20px;
            margin-bottom: 15px;
        }
        
        .study-content li {
            color: var(--text);
            margin-bottom: 8px;
        }
        
        .study-link {
            color: var(--primary);
            text-decoration: none;
        }
        
        .study-link:hover {
            text-decoration: underline;
        }
        
        .tag {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(0,240,255,0.2);
            color: var(--primary);
            border-radius: 20px;
            font-size: 12px;
            margin-right: 8px;
        }
        
        .tag.completed { background: rgba(0,255,136,0.2); color: #00ff88; }
        .tag.active { background: rgba(255,0,110,0.2); color: var(--accent); }
        
        /* 学习进度 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: var(--primary);
        }
        
        .stat-label {
            color: var(--text-dim);
            font-size: 14px;
            margin-top: 8px;
        }
        
        /* 响应式 */
        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr; }
            .tabs { gap: 8px; }
            .tab { padding: 10px 16px; font-size: 14px; }
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
        }
        
        .refresh-btn {
            display: block;
            margin: 20px auto;
            padding: 10px 24px;
            background: var(--bg-card);
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .refresh-btn:hover {
            background: var(--primary);
            color: #000;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">⛓️</div>
            <h1>Web3 Academy</h1>
            <p class="subtitle">区块链学习平台 - 从入门到实战</p>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p class="progress-text" id="progressText">学习进度：0%</p>
        </header>
        
        <!-- 标签页 -->
        <div class="tabs">
            <div class="tab active" data-tab="courses">📚 学习课程</div>
            <div class="tab" data-tab="study">📖 今日学习</div>
            <div class="tab" data-tab="prices">💰 实时行情</div>
            <div class="tab" data-tab="quiz">📝 每日测试</div>
        </div>
        
        <!-- 学习课程 -->
        <div class="content active" id="courses">
            <div class="course-grid" id="courseGrid"></div>
        </div>
        
        <!-- 今日学习 -->
        <div class="content" id="study">
            <div class="study-content" id="studyContent"></div>
        </div>
        
        <!-- 实时行情 -->
        <div class="content" id="prices">
            <div class="price-grid" id="priceGrid">
                <div class="loading">加载中...</div>
            </div>
            <button class="refresh-btn" onclick="loadPrices()">🔄 刷新价格</button>
        </div>
        
        <!-- 每日测试 -->
        <div class="content" id="quiz">
            <div class="quiz-container" id="quizContainer"></div>
        </div>
    </div>
    
    <script>
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderCourses();
            renderStudy();
            renderQuiz();
            loadPrices();
            updateProgress();
            initTabs();
        });
        
        // 标签页切换
        function initTabs() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(tab.dataset.tab).classList.add('active');
                });
            });
        }
        
        // 更新进度条
        function updateProgress() {
            const progress = (CONFIG.progress.completedDays / CONFIG.progress.totalDays) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = 
                `学习进度：第${CONFIG.progress.currentDay}天 · 已完成${CONFIG.progress.completedDays}天 · ${Math.round(progress)}%`;
        }
        
        // 渲染课程列表
        function renderCourses() {
            const grid = document.getElementById('courseGrid');
            grid.innerHTML = CONFIG.courses.map(course => `
                <div class="course-card ${course.status}" data-id="${course.id}">
                    <span class="course-status">
                        ${course.status === 'completed' ? '✅' : course.status === 'active' ? '🔥' : '🔒'}
                    </span>
                    <div class="course-day">第${course.day}天</div>
                    <div class="course-title">${course.title}</div>
                    <div class="course-desc">${course.desc}</div>
                </div>
            `).join('');
            
            // 点击事件
            document.querySelectorAll('.course-card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = parseInt(card.dataset.id);
                    if (CONFIG.quizzes[id]) {
                        document.querySelectorAll('.tab')[3].click();
                        renderQuiz(id);
                    }
                });
            });
        }
        
        // 渲染学习内容
        function renderStudy() {
            const content = document.getElementById('studyContent');
            const currentCourse = CONFIG.courses.find(c => c.id === CONFIG.progress.currentDay);
            
            const studyData = {
                1: {
                    title: "第1天：区块链基础概念",
                    tags: ["completed"],
                    content: `
                        <h2>区块链基础概念</h2>
                        
                        <h3>📖 理论要点</h3>
                        <ul>
                            <li><strong>区块链</strong>：分布式账本，不可篡改</li>
                            <li><strong>PoW (工作量证明)</strong>：BTC使用，需要大量算力</li>
                            <li><strong>PoS (权益证明)</strong>：ETH 2.0使用，质押代币</li>
                            <li><strong>BTC</strong> = 数字黄金，储值</li>
                            <li><strong>ETH</strong> = 智能合约平台</li>
                        </ul>
                        
                        <h3>🎬 推荐视频</h3>
                        <p>3Blue1Brown 区块链可视化：<a class="study-link" href="https://youtu.be/bBC-nXj3Ng4" target="_blank">YouTube链接</a></p>
                        
                        <h3>💻 实操任务</h3>
                        <ul>
                            <li>打开 <a class="study-link" href="https://www.blockchain.com/explorer" target="_blank">BTC区块浏览器</a></li>
                            <li>查询中本聪创世地址：1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa</li>
                        </ul>
                    `
                },
                2: {
                    title: "第2天：钱包基础",
                    tags: ["completed"],
                    content: `
                        <h2>钱包基础</h2>
                        
                        <h3>📖 理论要点</h3>
                        <ul>
                            <li><strong>私钥</strong>：随机生成的密码，谁有私钥谁控制资产</li>
                            <li><strong>公钥</strong>：由私钥推导，用于接收代币</li>
                            <li><strong>地址</strong>：由公钥推导，相当于银行卡号</li>
                            <li><strong>助记词</strong>：12/24个单词 = 私钥备份</li>
                            <li><strong>热钱包</strong>：联网使用（如Metamask）</li>
                            <li><strong>冷钱包</strong>：离线存储（如Ledger）</li>
                        </ul>
                        
                        <h3>🎬 推荐视频</h3>
                        <p>什么是数字钱包：<a class="study-link" href="https://youtu.be/QF4yjmPHGlQ" target="_blank">YouTube链接</a></p>
                        
                        <h3>💻 实操任务</h3>
                        <ul>
                            <li>在区块浏览器查询你的地址</li>
                            <li>查看交易记录</li>
                        </ul>
                    `
                },
                3: {
                    title: "第3天：区块浏览器实战",
                    tags: ["completed"],
                    content: `
                        <h2>区块浏览器实战</h2>
                        
                        <h3>📖 理论要点</h3>
                        <ul>
                            <li><strong>TxHash</strong>：交易哈希，每笔交易的唯一ID</li>
                            <li><strong>Block Height</strong>：区块高度</li>
                            <li><strong>Gas</strong>：网络手续费</li>
                            <li><strong>确认数</strong>：区块链确认次数</li>
                        </ul>
                        
                        <h3>🛠️ 常用工具</h3>
                        <ul>
                            <li><a class="study-link" href="https://www.blockchain.com/explorer" target="_blank">BTC浏览器</a></li>
                            <li><a class="study-link" href="https://etherscan.io" target="_blank">ETH浏览器</a></li>
                        </ul>
                        
                        <h3>💻 实操任务</h3>
                        <ul>
                            <li>用Etherscan查询LGNs代币</li>
                            <li>搜索LGNs合约地址</li>
                        </ul>
                    `
                },
                4: {
                    title: "第4天：交易所和KYC",
                    tags: ["active"],
                    content: `
                        <h2>第4天：交易所和KYC</h2>
                        
                        <h3>📖 理论要点</h3>
                        <ul>
                            <li><strong>CEX</strong> = 中心化交易所（币安、OKX、Bybit）</li>
                            <li><strong>DEX</strong> = 去中心化交易所（Uniswap、PancakeSwap）</li>
                            <li><strong>KYC</strong> = 身份验证（实名认证）</li>
                            <li><strong>为什么KYC重要</strong>：合规要求，反洗钱</li>
                        </ul>
                        
                        <h3>🏢 主流交易所</h3>
                        <ul>
                            <li><strong>币安 Binance</strong> - 全球最大</li>
                            <li><strong>OKX</strong> - 资历老</li>
                            <li><strong>Bybit</strong> - 衍生品强</li>
                        </ul>
                        
                        <h3>🎬 推荐视频</h3>
                        <p>币安新手入门：<a class="study-link" href="https://youtu.be/WZ2qw2g0y8M" target="_blank">YouTube链接</a></p>
                        
                        <h3>💻 实操任务</h3>
                        <ul>
                            <li>注册一个交易所账号</li>
                            <li>完成KYC认证</li>
                        </ul>
                    `
                }
            };
            
            const data = studyData[CONFIG.progress.currentDay] || studyData[1];
            content.innerHTML = data.content;
        }
        
        // 渲染测试题
        function renderQuiz(dayId = null) {
            const day = dayId || CONFIG.progress.currentDay;
            const questions = CONFIG.quizzes[day];
            const container = document.getElementById('quizContainer');
            
            if (!questions) {
                container.innerHTML = `
                    <div class="quiz-card">
                        <p style="text-align:center;color:var(--text-dim)">今天的测试题还未开放～</p>
                        <p style="text-align:center;color:var(--text-dim);margin-top:10px">完成前面课程后再来挑战吧！</p>
                    </div>
                `;
                return;
            }
            
            let html = `<h2 style="margin-bottom:20px;text-align:center">📝 第${day}天 测试题</h2>`;
            
            questions.forEach((q, i) => {
                html += `
                    <div class="quiz-card" id="q${i}">
                        <div class="quiz-question">${i+1}. ${q.q}</div>
                        <div class="quiz-options">
                            ${q.options.map((opt, j) => `
                                <div class="quiz-option" data-q="${i}" data-a="${j}">${opt}</div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
            
            html += `
                <div class="quiz-result" id="quizResult"></div>
            `;
            
            container.innerHTML = html;
            
            // 添加点击事件
            document.querySelectorAll('.quiz-option').forEach(opt => {
                opt.addEventListener('click', () => selectOption(opt));
            });
        }
        
        // 选择答案
        function selectOption(opt) {
            const qIdx = parseInt(opt.dataset.q);
            const aIdx = parseInt(opt.dataset.a);
            const question = CONFIG.quizzes[CONFIG.progress.currentDay][qIdx];
            
            // 禁用所有选项
            document.querySelectorAll(`[data-q="${qIdx}"]`).forEach(o => {
                o.style.pointerEvents = 'none';
                if (parseInt(o.dataset.a) === question.a) {
                    o.classList.add('correct');
                }
            });
            
            if (aIdx === question.a) {
                opt.classList.add('correct');
            } else {
                opt.classList.add('wrong');
            }
            
            // 检查是否全部答完
            const answered = document.querySelectorAll('.quiz-option[style*="pointer-events: none"]').length;
            const total = CONFIG.quizzes[CONFIG.progress.currentDay].length * 4;
            
            if (answered === total) {
                const correct = document.querySelectorAll('.quiz-option.correct').length;
                const totalQ = CONFIG.quizzes[CONFIG.progress.currentDay].length;
                const result = document.getElementById('quizResult');
                result.classList.add('show');
                result.innerHTML = correct === totalQ 
                    ? `🎉 恭喜！全部答对！`
                    : `📚 ${correct}/${totalQ} 题正确，继续加油！`;
                result.className = 'quiz-result show ' + (correct === totalQ ? 'success' : 'fail');
            }
        }
        
        // 加载价格
        async function loadPrices() {
            const grid = document.getElementById('priceGrid');
            grid.innerHTML = '<div class="loading">加载中...</div>';
            
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,origin-protocol,flow,telos&vs_currencies=usd&include_24hr_change=true');
                const data = await response.json();
                
                const icons = {
                    bitcoin: '₿',
                    ethereum: 'Ξ',
                    solana: '◎',
                    'origin-protocol': 'OG',
                    flow: '⬡',
                    telos: 'TLOS'
                };
                
                const names = {
                    bitcoin: 'Bitcoin',
                    ethereum: 'Ethereum',
                    solana: 'Solana',
                    'origin-protocol': 'Origin (OGN)',
                    flow: 'Flow',
                    telos: 'Telos'
                };
                
                grid.innerHTML = Object.keys(data).map(key => {
                    const price = data[key].usd;
                    const change = data[key].usd_24h_change;
                    return `
                        <div class="price-card">
                            <div class="price-icon">${icons[key] || '💎'}</div>
                            <div class="price-name">${names[key] || key}</div>
                            <div class="price-value">$${price.toLocaleString()}</div>
                            <div class="price-change ${change >= 0 ? 'price-up' : 'price-down'}">
                                ${change >= 0 ? '↑' : '↓'} ${Math.abs(change).toFixed(2)}%
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                grid.innerHTML = '<div class="loading">加载失败，请刷新</div>';
            }
        }
    </script>
</body>
</html>
